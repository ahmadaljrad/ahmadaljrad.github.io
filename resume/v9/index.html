<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lebenslauf Builder – aljrad.com</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

  <header class="app-header">
    <div class="app-logo">&#128196; Lebenslauf Builder</div>

    <div class="template-switcher">
      <label>Vorlage</label>
      <select id="template-select" class="template-select">
        <option value="default">Standard</option>
        <option value="classic">Klassisch</option>
        <option value="modern">Modern</option>
        <option value="compact">Kompakt</option>
        <option value="executive">Executive</option>
      </select>
    </div>

    <button id="btn-download" class="btn-pdf">&#8595;&nbsp; Als PDF speichern</button>
  </header>
<br>
  <main class="app-body">

    <!-- ════════ FORM PANEL ════════ -->
    <aside class="form-panel">
      <div class="panel-scroll">

        <nav class="form-tabs" id="form-tabs">
          <button class="tab-btn active" data-section="personal">Person</button>
          <button class="tab-btn" data-section="experience">Erfahrung</button>
          <button class="tab-btn" data-section="studium">Studium</button>
          <button class="tab-btn" data-section="schule">Schule</button>
          <button class="tab-btn" data-section="weiterbildung">Weiterb.</button>
          <button class="tab-btn" data-section="languages">Sprachen</button>
          <button class="tab-btn" data-section="skills">Kenntnisse</button>
          <button class="tab-btn" data-section="additional">Sonstiges</button>
        </nav>

        <!-- PERSONAL -->
        <section class="form-section active" id="section-personal">
          <h2 class="sec-head">Persönliche Daten</h2>

          <div class="photo-area">
            <div class="photo-box">
              <img id="photo-preview" src="" alt="" class="hidden" />
              <div class="photo-placeholder" id="photo-placeholder">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                <span>Kein Foto</span>
              </div>
            </div>
            <input type="file" id="photo-input" accept="image/*" hidden />
            <div class="photo-btns">
              <button class="fbtn" id="btn-upload-photo">Foto wählen</button>
              <button class="fbtn ghost" id="btn-remove-photo">Entfernen</button>
            </div>
          </div>

          <div class="fgrid">
            <div class="fg"><label>Vorname</label><input type="text" data-field="personalData.firstName" /></div>
            <div class="fg"><label>Nachname</label><input type="text" data-field="personalData.lastName" /></div>
            <div class="fg full"><label>Berufsbezeichnung</label><input type="text" data-field="personalData.jobTitle" /></div>
            <div class="fg full"><label>Straße & Hausnummer</label><input type="text" data-field="personalData.street" /></div>
            <div class="fg"><label>PLZ</label><input type="text" data-field="personalData.zip" /></div>
            <div class="fg"><label>Stadt</label><input type="text" data-field="personalData.city" /></div>
            <div class="fg"><label>Telefon</label><input type="text" data-field="personalData.phone" /></div>
            <div class="fg"><label>E-Mail</label><input type="email" data-field="personalData.email" /></div>
            <div class="fg"><label>Geburtsdatum</label><input type="text" data-field="personalData.birthDate" /></div>
            <div class="fg"><label>Geburtsort</label><input type="text" data-field="personalData.birthPlace" /></div>
            <div class="fg"><label>Nationalität</label><input type="text" data-field="personalData.nationality" /></div>
            <div class="fg"><label>Familienstand</label><input type="text" data-field="personalData.maritalStatus" /></div>
          </div>
        </section>

        <!-- EXPERIENCE -->
        <section class="form-section" id="section-experience">
          <h2 class="sec-head">Berufliche Erfahrung</h2>
          <div id="experience-list" class="dyn-list"></div>
          <button class="add-btn" id="btn-add-experience">+ Stelle hinzufügen</button>
        </section>

        <!-- STUDIUM -->
        <section class="form-section" id="section-studium">
          <h2 class="sec-head">Studium</h2>
          <div id="studium-list" class="dyn-list"></div>
          <button class="add-btn" id="btn-add-studium">+ Studium hinzufügen</button>
        </section>

        <!-- SCHULE -->
        <section class="form-section" id="section-schule">
          <h2 class="sec-head">Schulausbildung</h2>
          <div id="schule-list" class="dyn-list"></div>
          <button class="add-btn" id="btn-add-schule">+ Schule hinzufügen</button>
        </section>

        <!-- WEITERBILDUNG -->
        <section class="form-section" id="section-weiterbildung">
          <h2 class="sec-head">Weiterbildung & Zertifikate</h2>
          <div id="weiterbildung-list" class="dyn-list"></div>
          <button class="add-btn" id="btn-add-weiterbildung">+ Eintrag hinzufügen</button>
        </section>

        <!-- LANGUAGES -->
        <section class="form-section" id="section-languages">
          <h2 class="sec-head">Sprachen</h2>
          <div id="languages-list" class="dyn-list"></div>
          <button class="add-btn" id="btn-add-language">+ Sprache hinzufügen</button>
        </section>

        <!-- SKILLS -->
        <section class="form-section" id="section-skills">
          <h2 class="sec-head">Kenntnisse</h2>
          <p class="hint-text">Kategorie + Einträge (z.B. „MS Office: Word, Excel, PowerPoint")</p>
          <div id="skills-list" class="dyn-list"></div>
          <button class="add-btn" id="btn-add-skill">+ Kenntnisgruppe hinzufügen</button>
        </section>

        <!-- ADDITIONAL -->
        <section class="form-section" id="section-additional">
          <h2 class="sec-head">Sonstiges</h2>
          <div class="fgrid">
            <div class="fg full"><label>Führerschein</label><input type="text" data-field="additionalInfo.drivingLicense" /></div>
            <div class="fg full"><label>Hobbys & Interessen</label><textarea rows="2" data-field="additionalInfo.hobbies"></textarea></div>
            <div class="fg full"><label>Ehrenamt</label><textarea rows="2" data-field="additionalInfo.volunteering"></textarea></div>
            <div class="fg full"><label>Weitere Angaben</label><textarea rows="2" data-field="additionalInfo.other"></textarea></div>
          </div>
        </section>

      </div><!-- end panel-scroll -->
    </aside>

    <!-- ════════ PREVIEW PANEL ════════ -->
    <div class="preview-panel" id="preview-panel">

      <!-- Mobile top bar (hidden on desktop via CSS) -->
      <div class="mobile-preview-bar">
        <button class="btn-back" id="btn-preview-back">&#8592; Zurück</button>
        <span class="mobile-bar-title">Vorschau</span>
        <button class="btn-print-mobile" id="btn-print-mobile">&#8595; PDF</button>
      </div>

      <div class="preview-scale-wrap" id="preview-scale-wrap">
        <div id="cv-root"></div>
      </div>
    </div>

  </main>

  <!-- Mobile floating preview button -->
  <button class="btn-preview-fab" id="btn-preview-fab" aria-label="Vorschau anzeigen">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    Vorschau
  </button>

  <script src="app.js"></script>
</body>
</html>
