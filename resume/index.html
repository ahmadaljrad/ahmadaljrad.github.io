<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebenslauf Builder - aljrad.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>Lebenslauf Builder</h1>
            <p>Professioneller deutscher Lebenslauf • Erstellt mit <a href="https://aljrad.com" target="_blank">aljrad.com</a></p>
        </header>

        <div class="main-content">
            <!-- LEFT: Form -->
            <div class="form-panel">
                <div class="form-container">
                    <!-- Personal Information -->
                    <section class="form-section">
                        <h2>Persönliche Daten</h2>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Vorname</label>
                                <input type="text" id="firstName" data-model="personalData.firstName">
                            </div>
                            <div class="form-group">
                                <label>Nachname</label>
                                <input type="text" id="lastName" data-model="personalData.lastName">
                            </div>
                            <div class="form-group">
                                <label>Titel</label>
                                <input type="text" id="title" data-model="personalData.title" placeholder="z.B. Dipl.-Kauffrau">
                            </div>
                            <div class="form-group">
                                <label>Geburtsdatum</label>
                                <input type="text" id="birthDate" data-model="personalData.birthDate" placeholder="01.01.1990">
                            </div>
                            <div class="form-group">
                                <label>Adresse</label>
                                <input type="text" id="address" data-model="personalData.address">
                            </div>
                            <div class="form-group">
                                <label>PLZ / Ort</label>
                                <input type="text" id="location" data-model="personalData.location" placeholder="80331 München">
                            </div>
                            <div class="form-group">
                                <label>Telefon</label>
                                <input type="tel" id="phone" data-model="personalData.phone">
                            </div>
                            <div class="form-group">
                                <label>E-Mail</label>
                                <input type="email" id="email" data-model="personalData.email">
                            </div>
                            <div class="form-group">
                                <label>Nationalität</label>
                                <input type="text" id="nationality" data-model="personalData.nationality" value="Deutsch">
                            </div>
                        </div>
                        
                        <!-- Profile Photo -->
                        <div class="photo-upload">
                            <label>Profilfoto</label>
                            <input type="file" id="photoUpload" accept="image/*">
                            <div id="photoPreview" class="photo-preview"></div>
                        </div>
                    </section>

                    <!-- Professional Experience -->
                    <section class="form-section">
                        <div class="section-header">
                            <h2>Berufserfahrung</h2>
                            <button id="addExperience" class="add-btn">+ Hinzufügen</button>
                        </div>
                        <div id="experienceList"></div>
                    </section>

                    <!-- Education -->
                    <section class="form-section">
                        <div class="section-header">
                            <h2>Ausbildung</h2>
                            <button id="addEducation" class="add-btn">+ Hinzufügen</button>
                        </div>
                        <div id="educationList"></div>
                    </section>

                    <!-- Certifications -->
                    <section class="form-section">
                        <div class="section-header">
                            <h2>Weiterbildung / Zertifikate</h2>
                            <button id="addCertification" class="add-btn">+ Hinzufügen</button>
                        </div>
                        <div id="certificationList"></div>
                    </section>

                    <!-- Skills -->
                    <section class="form-section">
                        <h2>Fähigkeiten</h2>
                        <div class="form-group">
                            <textarea id="skills" rows="4" placeholder="z.B. Projektmanagement, Buchhaltung, MS Office, Kundenservice..."></textarea>
                        </div>
                    </section>

                    <!-- Languages -->
                    <section class="form-section">
                        <h2>Sprachen</h2>
                        <div id="languagesList"></div>
                        <button id="addLanguage" class="add-btn">+ Sprache hinzufügen</button>
                    </section>

                    <!-- Additional Information -->
                    <section class="form-section">
                        <h2>Sonstiges</h2>
                        <div class="form-group">
                            <textarea id="additionalInfo" rows="3" placeholder="Führerschein, Ehrenamt, etc."></textarea>
                        </div>
                    </section>
                </div>
            </div>

            <!-- RIGHT: Preview -->
            <div class="preview-panel">
                <div class="preview-header">
                    <button id="downloadPDF" class="download-btn">📄 PDF herunterladen</button>
                </div>
                
                <div class="cv-container">
                    <div id="cvPreview" class="cv-preview">
                        <!-- CV rendered by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
