<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lebenslauf Builder – aljrad.com</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

  <!-- ═══════════════════════════ HEADER ═══════════════════════════ -->
  <header class="app-header">
    <div class="header-logo">
      <span class="logo-mark">LB</span>
      <span class="logo-text">Lebenslauf<strong>Builder</strong></span>
    </div>
    <div class="header-actions">
      <button id="btn-download" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Als PDF speichern
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════ MAIN ═══════════════════════════ -->
  <main class="app-body">

    <!-- ───────── LEFT: FORM PANEL ───────── -->
    <aside class="form-panel" id="form-panel">
      <div class="panel-scroll">

        <!-- SECTION TABS -->
        <nav class="form-tabs" id="form-tabs">
          <button class="tab-btn active" data-section="personal">Person</button>
          <button class="tab-btn" data-section="experience">Erfahrung</button>
          <button class="tab-btn" data-section="education">Ausbildung</button>
          <button class="tab-btn" data-section="skills">Fähigkeiten</button>
          <button class="tab-btn" data-section="languages">Sprachen</button>
          <button class="tab-btn" data-section="certifications">Zertifikate</button>
          <button class="tab-btn" data-section="additional">Sonstiges</button>
        </nav>

        <!-- ── PERSONAL ── -->
        <section class="form-section active" id="section-personal">
          <h2 class="section-title">Persönliche Daten</h2>

          <div class="photo-upload-area" id="photo-upload-area">
            <div class="photo-preview-wrap">
              <img id="photo-preview" src="" alt="Foto" class="photo-preview hidden" />
              <div class="photo-placeholder" id="photo-placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                <span>Foto hochladen</span>
              </div>
            </div>
            <input type="file" id="photo-input" accept="image/*" hidden />
            <div class="photo-actions">
              <button class="btn btn-outline btn-sm" id="btn-upload-photo">Bild wählen</button>
              <button class="btn btn-ghost btn-sm" id="btn-remove-photo">Entfernen</button>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label>Vorname</label>
              <input type="text" data-field="personalData.firstName" placeholder="Max" />
            </div>
            <div class="form-group">
              <label>Nachname</label>
              <input type="text" data-field="personalData.lastName" placeholder="Mustermann" />
            </div>
            <div class="form-group full">
              <label>Berufsbezeichnung</label>
              <input type="text" data-field="personalData.jobTitle" placeholder="Projektmanager" />
            </div>
            <div class="form-group full">
              <label>Adresse</label>
              <input type="text" data-field="personalData.address" placeholder="Musterstraße 12, 80331 München" />
            </div>
            <div class="form-group">
              <label>Telefon</label>
              <input type="text" data-field="personalData.phone" placeholder="+49 89 123456" />
            </div>
            <div class="form-group">
              <label>E-Mail</label>
              <input type="email" data-field="personalData.email" placeholder="max@beispiel.de" />
            </div>
            <div class="form-group">
              <label>Geburtsdatum</label>
              <input type="text" data-field="personalData.birthDate" placeholder="15.03.1988" />
            </div>
            <div class="form-group">
              <label>Geburtsort</label>
              <input type="text" data-field="personalData.birthPlace" placeholder="München" />
            </div>
            <div class="form-group">
              <label>Nationalität</label>
              <input type="text" data-field="personalData.nationality" placeholder="Deutsch" />
            </div>
            <div class="form-group">
              <label>Familienstand</label>
              <input type="text" data-field="personalData.maritalStatus" placeholder="ledig" />
            </div>
            <div class="form-group full">
              <label>Website / LinkedIn</label>
              <input type="text" data-field="personalData.website" placeholder="linkedin.com/in/max-mustermann" />
            </div>
            <div class="form-group full">
              <label>Kurzprofil</label>
              <textarea rows="3" data-field="personalData.summary" placeholder="Kurze Zusammenfassung Ihrer Stärken..."></textarea>
            </div>
          </div>
        </section>

        <!-- ── EXPERIENCE ── -->
        <section class="form-section" id="section-experience">
          <h2 class="section-title">Berufserfahrung</h2>
          <div id="experience-list" class="dynamic-list"></div>
          <button class="btn btn-add" id="btn-add-experience">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Erfahrung hinzufügen
          </button>
        </section>

        <!-- ── EDUCATION ── -->
        <section class="form-section" id="section-education">
          <h2 class="section-title">Ausbildung</h2>
          <div id="education-list" class="dynamic-list"></div>
          <button class="btn btn-add" id="btn-add-education">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Ausbildung hinzufügen
          </button>
        </section>

        <!-- ── SKILLS ── -->
        <section class="form-section" id="section-skills">
          <h2 class="section-title">Fähigkeiten</h2>
          <div id="skills-list" class="dynamic-list"></div>
          <button class="btn btn-add" id="btn-add-skill">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Fähigkeit hinzufügen
          </button>
        </section>

        <!-- ── LANGUAGES ── -->
        <section class="form-section" id="section-languages">
          <h2 class="section-title">Sprachen</h2>
          <div id="languages-list" class="dynamic-list"></div>
          <button class="btn btn-add" id="btn-add-language">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Sprache hinzufügen
          </button>
        </section>

        <!-- ── CERTIFICATIONS ── -->
        <section class="form-section" id="section-certifications">
          <h2 class="section-title">Weiterbildung & Zertifikate</h2>
          <div id="certifications-list" class="dynamic-list"></div>
          <button class="btn btn-add" id="btn-add-certification">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Zertifikat hinzufügen
          </button>
        </section>

        <!-- ── ADDITIONAL ── -->
        <section class="form-section" id="section-additional">
          <h2 class="section-title">Sonstige Angaben</h2>
          <div class="form-grid">
            <div class="form-group full">
              <label>Führerschein</label>
              <input type="text" data-field="additionalInfo.drivingLicense" placeholder="Klasse B" />
            </div>
            <div class="form-group full">
              <label>Hobbys & Interessen</label>
              <textarea rows="2" data-field="additionalInfo.hobbies" placeholder="Wandern, Lesen, Fotografie"></textarea>
            </div>
            <div class="form-group full">
              <label>Ehrenamt</label>
              <textarea rows="2" data-field="additionalInfo.volunteering" placeholder="Freiwillige Feuerwehr München"></textarea>
            </div>
            <div class="form-group full">
              <label>Weitere Angaben</label>
              <textarea rows="2" data-field="additionalInfo.other" placeholder="Weitere relevante Informationen..."></textarea>
            </div>
          </div>
        </section>

      </div><!-- end panel-scroll -->
    </aside>

    <!-- ───────── RIGHT: PREVIEW PANEL ───────── -->
    <div class="preview-panel" id="preview-panel">
      <div class="preview-scale-wrap">
        <div class="cv-page" id="cv-preview">
          <!-- Rendered by View module -->
        </div>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
