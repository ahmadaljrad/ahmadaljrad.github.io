<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مهام تطوير البرمجيات المتقدمة</title>
<style>
  body { font-family: Arial; margin:0; padding:0; background:#f4f4f9; color:#333; }
  header { background:#4a90e2; color:white; padding:1rem 2rem; text-align:center; }
  main { max-width:900px; margin:2rem auto; padding:0 1rem; }
  .task { background:white; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-bottom:1rem; padding:1rem 1.5rem; cursor:pointer; transition:transform 0.2s; }
  .task:hover { transform:scale(1.02); }
  .task h2 { margin:0; font-size:1.2rem; color:#4a90e2; }
  .task textarea { 
    width:100%; 
    margin-top:0.5rem; 
    padding:0.5rem; 
    font-family: Arial; 
    font-size: 1rem; 
    resize: vertical; 
    border-radius: 5px; 
    border: 1px solid #ccc; 
    background: #f9f9f9; 
    display:none;
  }
  .task.active textarea { display:block; }
</style>
</head>
<body>
<header>
<h1>مهام تطوير البرمجيات المتقدمة</h1>
<p>قائمة بالمهام العملية لمهندسي البرمجيات على مستوى Senior وStaff</p>
</header>
<main id="tasks-container"></main>

<script>
async function loadTasks() {
  try {
    const response = await fetch('tasks.txt'); // إذا الملف في مجلد فرعي، ضع path صحيح
    const data = await response.text();
    const container = document.getElementById('tasks-container');

    data.split('\n').forEach(line => {
      if (!line.trim()) return;

      const firstDot = line.indexOf('.');
      if (firstDot === -1) return;

      const num = line.substring(0, firstDot).trim();
      const rest = line.substring(firstDot + 1).trim();

      // تقسيم rest عند أول نقطة لتحديد العنوان والوصف
      const secondDot = rest.indexOf('.');
      let title, desc;
      if (secondDot === -1) {
        title = rest;
        desc = '';
      } else {
        title = rest.substring(0, secondDot).trim();
        desc = rest.substring(secondDot + 1).trim();
      }

      const div = document.createElement('div');
      div.className = 'task';
      div.innerHTML = `
        <h2>${num}. ${title}</h2>
        <textarea readonly>${desc}</textarea>
      `;
      div.addEventListener('click', () => div.classList.toggle('active'));
      container.appendChild(div);
    });
  } catch (err) {
    console.error('خطأ في تحميل المهام:', err);
  }
}

loadTasks();
</script>
</body>
</html>
