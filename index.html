<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahmad Al Jarad</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=Noto+Sans+Arabic:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
  emailjs.init("S7Va9RI9iSuGzkAwM");
</script>

<body data-theme="light">

  <!-- Loading -->
  <div id="loading">
    <div class="loader-ring"></div>
  </div>

  <!-- SVG icons -->
  <svg style="display:none" aria-hidden="true">
    <!-- انسخ هنا كل SVG من كودك كما هو -->
  </svg>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <div class="nav-brand">
        <div class="nav-monogram" id="nav-mono"></div>
        <span class="nav-name" id="nav-name"></span>
      </div>
      <div class="nav-controls">
        <button class="lang-pill active" data-lang-btn="en" onclick="App.setLang('en')">EN</button>
        <button class="lang-pill" data-lang-btn="de" onclick="App.setLang('de')">DE</button>
        <button class="lang-pill" data-lang-btn="ar" onclick="App.setLang('ar')">عر</button>
        <button class="theme-btn" id="themeBtn" onclick="App.toggleTheme()">🌙</button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main id="main"></main>

  <!-- Footer -->
  <footer id="site-footer"></footer>

  <script src="app.js"></script>
</body>
</html>
